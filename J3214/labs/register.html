<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация — Omagad</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card" style="max-width: 480px">
    <div style="font-size: 2.5rem; text-align: center">🎓</div>
    <h2>Omagad</h2>
    <p class="subtitle">Создайте аккаунт</p>

    <form id="registerForm">
      <div class="row mb-3">
        <div class="col-6">
          <label class="form-label">Имя</label>
          <input type="text" class="form-control" placeholder="Айдар" required />
        </div>
        <div class="col-6">
          <label class="form-label">Фамилия</label>
          <input type="text" class="form-control" placeholder="Шумбалов" required />
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="you@example.com" required />
      </div>

      <div class="mb-3">
        <label class="form-label">Пароль</label>
        <input type="password" class="form-control" id="password" placeholder="Минимум 6 символов" required />
      </div>

      <div class="mb-3">
        <label class="form-label">Подтвердите пароль</label>
        <input type="password" class="form-control" id="confirmPassword" placeholder="Повторите пароль" required />
        <div id="passwordError" class="text-danger small mt-1" style="display: none">Пароли не совпадают</div>
      </div>

      <div class="mb-3">
        <label class="form-label">Я хочу</label>
        <select class="form-select">
          <option value="student">Учиться</option>
          <option value="instructor">Преподавать</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary w-100 mb-3">Создать аккаунт</button>

      <p class="text-center small mb-0">
        Уже есть аккаунт? <a href="login.html">Войти</a>
      </p>
    </form>
  </div>
</div>

<script>
  document.getElementById('registerForm').addEventListener('submit', function (e) {
    e.preventDefault();

    var pass = document.getElementById('password').value;
    var confirm = document.getElementById('confirmPassword').value;

    if (pass !== confirm) {
      document.getElementById('passwordError').style.display = 'block';
      return;
    }

    document.getElementById('passwordError').style.display = 'none';
    alert('Аккаунт создан!');
    window.location.href = 'login.html';
  });
</script>

</body>
</html>
