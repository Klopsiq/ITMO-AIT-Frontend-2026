<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2> ривет земля </h2>


    <div class="container"> <div
        class="alert alert-primary"
        role="alert"
    >
        <h4 class="alert-heading">Alert Heading</h4>
        <p>Alert Content</p>
        <hr />
        <p class="mb-0">Alert Description</p>
    </div>

    <button
        type="button"
        class="btn btn-secondary"
        data-bs-container="body"
        data-bs-toggle="popover"
        data-bs-placement="top"
        title="Popup title"
        data-bs-content="Popup content"
    >
        Trigger
    </button>
    
     </div>

     <div class="btn-group-vertical" role="group" aria-label="">
        <button type="button" class="btn btn-secondary">First One</button>
        <button type="button" class="btn btn-secondary">Second One</button>
        <div class="btn-group" role="group">
            <button
                id="dropdownId"
                type="button"
                class="btn btn-secondary dropdown-toggle"
                data-bs-toggle="dropdown"
                aria-haspopup="true"
                aria-expanded="false"
            >
                More
            </button>
            <div class="dropdown-menu" aria-labelledby="dropdownId">
                <a class="dropdown-item" href="#">First Dropdown</a>
                <a class="dropdown-item" href="#">Second Dropdown</a>
            </div>
        </div>
     </div>
     
</body>
</html>
