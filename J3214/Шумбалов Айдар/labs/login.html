<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — Omagad</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-icon">🎓</div>
    <h2>Omagad</h2>
    <p class="subtitle">Платформа онлайн-обучения</p>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label" for="email">Email</label>
        <input type="email" class="form-control" id="email" placeholder="you@example.com" required />
      </div>

      <div class="mb-3">
        <label class="form-label" for="password">Пароль</label>
        <input type="password" class="form-control" id="password" placeholder="Введите пароль" required />
      </div>

      <div class="mb-3 form-check">
        <input class="form-check-input" type="checkbox" id="rememberMe" />
        <label class="form-check-label small" for="rememberMe">Запомнить меня</label>
      </div>

      <button type="submit" class="btn btn-primary w-100 mb-3">Войти</button>

      <p class="text-center small mb-0">
        Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
      </p>
    </form>
  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
