<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация — Omagad</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card auth-card-wide">
    <div class="auth-icon">🎓</div>
    <h2>Omagad</h2>
    <p class="subtitle">Создайте аккаунт</p>

    <form id="registerForm">
      <div class="row mb-3">
        <div class="col-6">
          <label class="form-label" for="firstName">Имя</label>
          <input type="text" class="form-control" id="firstName" placeholder="Айдар" required />
        </div>
        <div class="col-6">
          <label class="form-label" for="lastName">Фамилия</label>
          <input type="text" class="form-control" id="lastName" placeholder="Шумбалов" required />
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="regEmail">Email</label>
        <input type="email" class="form-control" id="regEmail" placeholder="you@example.com" required />
      </div>

      <div class="mb-3">
        <label class="form-label" for="regPassword">Пароль</label>
        <input type="password" class="form-control" id="regPassword" placeholder="Минимум 6 символов" required />
      </div>

      <div class="mb-3">
        <label class="form-label" for="regConfirm">Подтвердите пароль</label>
        <input type="password" class="form-control" id="regConfirm" placeholder="Повторите пароль" required />
        <div id="passwordError" class="text-danger small mt-1 d-none">Пароли не совпадают</div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="userGoal">Я хочу</label>
        <select class="form-select" id="userGoal">
          <option value="student">Учиться</option>
          <option value="instructor">Преподавать</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary w-100 mb-3">Создать аккаунт</button>

      <p class="text-center small mb-0">
        Уже есть аккаунт? <a href="login.html">Войти</a>
      </p>
    </form>
  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
